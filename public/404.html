<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Murerfirmaet MVO</title>
    <script>
      // Encode the path as a query param and redirect to the root
      // so GitHub Pages serves index.html, which then restores the route
      var path = window.location.pathname + window.location.search;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
</html>
